# Supabase project config for Edge Functions deployment.
# Ref: https://supabase.com/docs/guides/cli/config
project_id = "zoikoxzdjhxlqglxdaik"

[functions.admin-users]
# Runtime-level verify_jwt is disabled because this project uses the new
# asymmetric JWT Signing Keys (ES256) which the runtime's built-in verifier
# does not support yet. We perform JWT validation + super_admin role check
# ourselves inside the function (verifySuperAdmin).
verify_jwt = false
